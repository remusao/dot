backend = "xrender";
vsync = true;

shadow = true;
shadow-radius = 10;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.35;
shadow-exclude = [
    "class_g = 'i3-frame'",
    "class_g = 'i3bar'",
    "_GTK_FRAME_EXTENTS@:c",
];

fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;

inactive-dim = 0.04;

unredir-if-possible = false;
xinerama-shadow-crop = true;
