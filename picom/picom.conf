backend = "glx";
vsync = true;

shadow = true;
shadow-radius = 8;
shadow-offset-x = -4;
shadow-offset-y = -4;
shadow-opacity = 0.3;
shadow-exclude = [
    "class_g = 'i3-frame'",
    "class_g = 'i3bar'",
    "_GTK_FRAME_EXTENTS@:c",
];

fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;

unredir-if-possible = false;
crop-shadow-to-monitor = true;
