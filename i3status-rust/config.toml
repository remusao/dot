[icons]
icons = "awesome6"

[theme]
theme = "plain"

[theme.overrides]
idle_bg = "#222222"
idle_fg = "#c0c5ce"
separator = "| "
separator_bg = "#222222"
separator_fg = "#333333"
info_bg = "#285577"
info_fg = "#ffffff"
good_bg = "#222222"
good_fg = "#88b090"
warning_bg = "#b08850"
warning_fg = "#ffffff"
critical_bg = "#900000"
critical_fg = "#ffffff"

# MPRIS (Firefox, any media player)
[[block]]
block = "music"
format = " $icon {$combo.str(max_w:20) |}"
[[block.click]]
button = "left"
action = "play_pause"

# CPU temperature (AMD Ryzen via k10temp)
[[block]]
block = "temperature"
format = " $icon $max"
interval = 5
chip = "k10temp-*"
good = 50
idle = 70
info = 80
warning = 90

# Network
[[block]]
block = "net"
format = " $icon {$signal_strength |$ip}"
interval = 5

# Sound (replaces pasystray)
[[block]]
block = "sound"
format = " $icon {$volume|}"
[block.icons_overrides]
volume_muted = ""
[[block.click]]
button = "left"
cmd = "pavucontrol"

# Backlight
[[block]]
block = "backlight"
format = " $icon $brightness"
[block.icons_overrides]
backlight = [""]

# Battery
[[block]]
block = "battery"
driver = "upower"
format = " $icon $percentage {$time_remaining|}"
full_format = " $icon $percentage"
charging_format = " $icon $percentage {$time_remaining|}"
missing_format = ""
full_threshold = 95
warning = 30
critical = 15

# Date/Time
[[block]]
block = "time"
format = " $timestamp.datetime(f:'%a %d %b %H:%M') |"
interval = 30
