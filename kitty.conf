# kitty 0.46+ — urxvt-faithful preset for HP ZBook Ultra G1a (X11 + i3, 130 DPI).
# Palette + cursor + font + sizes ported 1:1 from /home/remi/.dot/Xresources;
# layered with kitty's modern wins: graphics protocol, GPU rendering, snappy input.

# ── Font (matches Xresources MesloLGS NF 10pt + p10k nerdfont-v3 mode) ───
# MesloLGS NF ships real Bold/Italic/BoldItalic faces, so `auto` resolves
# correctly for every variant — no need to spell each style explicitly.
font_family       MesloLGS NF
bold_font         auto
italic_font       auto
bold_italic_font  auto
font_size         10.0
disable_ligatures never
undercurl_style   thin-sparse
# Match urxvt/Xft's sRGB compositing — kitty's default `platform` uses
# linear-light blending which renders light-on-dark text noticeably thicker.
text_composition_strategy legacy

# ── Cursor (matches urxvt: darkorange1 block, no blink) ──────────────────
cursor_shape           block
cursor_blink_interval  0
cursor                 #FF7F00
cursor_text_color      #191919
# Hide pointer immediately on keypress (urxvt parity: URxvt.pointerBlank: true).
mouse_hide_wait        -1

# ── Scrollback (matches urxvt saveLines) ─────────────────────────────────
scrollback_lines              65535
scrollback_pager_history_size 10
strip_trailing_spaces         smart
scrollbar                     never
# urxvt parity: instant line-based jumps, no smooth scroll, no inertia.
pixel_scroll                  no
momentum_scroll               0

# ── Selection (urxvt uses reverse video — kitty `none` = reverse) ────────
selection_foreground   none
selection_background   none

# ── URLs ─────────────────────────────────────────────────────────────────
url_style              curly

# ── Performance (lowest-latency for X11/i3, no compositor) ───────────────
# repaint_delay 2 / input_delay 0 / sync_to_monitor no is upstream's
# documented minimum-latency profile (kitty/docs/performance.rst).
repaint_delay     2
input_delay       0
sync_to_monitor   no

# ── Bell (urxvt was silent in practice) ──────────────────────────────────
enable_audio_bell no

# ── Window (urxvt internalBorder/externalBorder = 0) ─────────────────────
remember_window_size     no
window_padding_width     0
confirm_os_window_close  -1

# ── Tab bar (urxvt has no native tabs; i3 manages multi-window) ──────────
tab_bar_style hidden

# ── Palette (Solarized-ish, exact urxvt values) ──────────────────────────
# Note: urxvt forces ALL bold text orange via `colorBD: orange`. Kitty has
# no native equivalent (kovidgoyal/kitty#8276, open) — achieving parity
# would require a kitty source patch, explicitly rejected. Bold here keeps
# its semantic colour; orange accent moved to borders below.
# Inactive-window fade (urxvt parity: URxvt.fading: 30 ≈ alpha 0.7).
inactive_text_alpha    0.7

foreground             #c6c6c6
background             #191919

# Borders — orange accents partially substitute for urxvt's colorBD warmth
active_border_color    #FF7F00
inactive_border_color  #073642
bell_border_color      #FF7F00

# Marks (Solarized blue/magenta/cyan over bg)
mark1_foreground #191919
mark1_background #268bd2
mark2_foreground #191919
mark2_background #d33682
mark3_foreground #191919
mark3_background #2aa198

# black
color0  #073642
color8  #002b36
# red
color1  #dc322f
color9  #cb4b16
# green
color2  #25b20f
color10 #586e75
# yellow
color3  #b58900
color11 #657b83
# blue
color4  #268bd2
color12 #839496
# magenta
color5  #d33682
color13 #6c71c4
# cyan
color6  #2aa198
color14 #93a1a1
# white
color7  #eee8d5
color15 #fdf6e3

# ── Behaviour (modern wins; no urxvt analog, additive) ───────────────────
editor                /usr/bin/nvim
shell_integration     no-cursor
allow_remote_control  socket-only
listen_on             unix:@kitty-{kitty_pid}
# Reads prompt (OSC 52 from SSH/remote can otherwise silently steal the clipboard).
clipboard_control     write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size    64
paste_actions         quote-urls-at-prompt,confirm,confirm-if-large
notify_on_cmd_finish  unfocused 15.0
linux_display_server  x11

# ── Keybinds ─────────────────────────────────────────────────────────────
map kitty_mod+enter      new_window
map kitty_mod+t          new_tab
map kitty_mod+w          close_window
map kitty_mod+q          close_tab
map kitty_mod+l          next_tab
map kitty_mod+h          previous_tab
map kitty_mod+plus       change_font_size all +1.0
map kitty_mod+minus      change_font_size all -1.0
map kitty_mod+0          change_font_size all 0
map kitty_mod+u          kitten unicode_input
map kitty_mod+f          show_scrollback
map kitty_mod+slash      launch --type=overlay --stdin-source=@screen_scrollback /usr/bin/less +G -R
map kitty_mod+r          load_config_file
# urxvt parity: Ctrl+Alt+C/V mirror urxvt's built-in clipboard (command.C:793-803).
# Kitty's default Ctrl+Shift+C/V remains active alongside.
map ctrl+alt+c           copy_to_clipboard
map ctrl+alt+v           paste_from_clipboard

# ── Lean-ops (audited; see plans/please-compare-the-memory-zany-hartmanis.md) ──
# Scope jemalloc to kitty's own process. Kitty keeps jemalloc (already mapped
# by ld.so before these directives run); spawned shells/commands inherit
# neither LD_PRELOAD nor MALLOC_CONF, so they fall back to glibc malloc.
env                      LD_PRELOAD
env                      MALLOC_CONF

# Disable the inotify config-watcher subprocess (~3-8 MB + a watch).
# auto_reload_config is a float (default 0.1); boss.py:1398 only spawns the
# watcher when value >= 0. Manual reload via kitty_mod+r remains.
auto_reload_config       -1

# clone-in-kitty is unused in this setup; drop the code path.
allow_cloning            no

# Skip per-mouse-motion URL regex scan and the hover-underline render path.
# URLs remain clickable via Ctrl+click (open_url_modifiers default).
detect_urls              no
underline_hyperlinks     never
